name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        version:
          - 'lts'
          - '1'       # latest stable
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        arch:
          - x64
        exclude:
          - os: macos-latest
            arch: x64
        include:
          - version: '1'
            os: macos-latest
            arch: aarch64
          - version: 'lts'
            os: macos-latest
            arch: aarch64

    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}

      - uses: julia-actions/cache@v2
        with:
          cache-name: mapvbvd-test-data
          cache-registries: "true"

      # Cache downloaded test data across CI runs
      - name: Cache test data
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.mapvbvd_test_data
          key: test-data-v1

      - uses: julia-actions/julia-buildpkg@v1

      - uses: julia-actions/julia-runtest@v1
        env:
          MAPVBVD_TEST_DATA: ${{ github.workspace }}/.mapvbvd_test_data